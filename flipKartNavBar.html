<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="flipKartNavBar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <nav>
        <article>
            <div class="firstNav">
                <div class="logo">
                    <div class="flipkart">
                        <div class="f">
                            <img alt="Image" class="" aria-busy="false" data-highres-loaded="false" loading="lazy"
                                fetchpriority="auto" height="22" width="25.666666666666668"
                                srcset="https://rukminim1.flixcart.com/fk-p-flap/26/22/image/d2ecfddf891a3922.png?q=80 1x, https://rukminim1.flixcart.com/fk-p-flap/52/44/image/d2ecfddf891a3922.png?q=60 2x, "
                                src="https://rukminim1.flixcart.com/fk-p-flap/52/44/image/d2ecfddf891a3922.png?q=90"
                                style="filter: none; opacity: 1; transition: filter 0.5s ease-in-out, opacity 0.5s ease-in-out; width: 100%; height: 100%; margin: auto; object-fit: contain; aspect-ratio: 7 / 6;">
                        </div>
                        <div class="flip">
                            <img alt="Image" class="" aria-busy="false" data-highres-loaded="false" loading="lazy"
                                fetchpriority="auto" height="18" width="46"
                                srcset="https://rukminim1.flixcart.com/fk-p-flap/46/18/image/31f7e3af490c225f.png?q=80 1x, https://rukminim1.flixcart.com/fk-p-flap/92/36/image/31f7e3af490c225f.png?q=60 2x, "
                                src="https://rukminim1.flixcart.com/fk-p-flap/92/36/image/31f7e3af490c225f.png?q=90"
                                style="filter: none; opacity: 1; transition: filter 0.5s ease-in-out, opacity 0.5s ease-in-out; width: 100%; height: 100%; margin: auto; object-fit: contain; aspect-ratio: 23 / 9;">
                        </div>
                    </div>

                    <div class="aeroplane">
                        <div class="plane">
                            <img alt="Image" class="" aria-busy="false" data-highres-loaded="false" loading="lazy"
                                fetchpriority="auto" height="22" width="29.333333333333332"
                                srcset="https://rukminim1.flixcart.com/fk-p-flap/29/22/image/7ab4040af860941d.png?q=80 1x, https://rukminim1.flixcart.com/fk-p-flap/58/44/image/7ab4040af860941d.png?q=60 2x, "
                                src="https://rukminim1.flixcart.com/fk-p-flap/58/44/image/7ab4040af860941d.png?q=90"
                                style="filter: none; opacity: 1; transition: filter 0.5s ease-in-out, opacity 0.5s ease-in-out; width: 100%; height: 100%; margin: auto; object-fit: contain; aspect-ratio: 4 / 3;">
                        </div>
                        <div class="travel">
                            <img alt="Image" class="" aria-busy="false" data-highres-loaded="false" loading="lazy"
                                fetchpriority="auto" height="18" width="36.25"
                                srcset="https://rukminim1.flixcart.com/fk-p-flap/36/18/image/5a9ff48eef96b876.png?q=80 1x, https://rukminim1.flixcart.com/fk-p-flap/72/36/image/5a9ff48eef96b876.png?q=60 2x, "
                                src="https://rukminim1.flixcart.com/fk-p-flap/72/36/image/5a9ff48eef96b876.png?q=90"
                                style="filter: none; opacity: 1; transition: filter 0.5s ease-in-out, opacity 0.5s ease-in-out; width: 100%; height: 100%; margin: auto; object-fit: contain; aspect-ratio: 145 / 72;">
                        </div>
                    </div>
                </div>
                <div class="location">
                    <p><i class="fa-sharp fa-solid fa-location-dot"></i><b>Location not set &nbsp;<a href="">Select
                                delivery location &gt;</a></b></p>
                </div>
            </div>

            <br>

            <div class="secondNav">
                <div class="input">
                    <input type="text" placeholder="Search for Products, Brands and More">
                </div>
                <div class="menu">
                    <span><i class="fa-regular fa-user"></i></span>
                    <select>
                        <option value="">Login</option>
                        <option value="">2</option>
                    </select>

                    <select>
                        <option value="">More</option>
                        <option value="">2</option>
                    </select>

                    <a href="">
                        <i class="fa-solid fa-cart-shopping"></i>
                        Cart
                    </a>
                </div>
            </div>
        </article>
    </nav>
</body>

</html>
