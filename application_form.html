<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
</head>
<body>
    <center>
        <fieldset>
            <legend>Application Form</legend>
            <form action="./php">
                <h3 align="center" bgcolor="#454545">PERSONAL DETAILS</h3> <br>

                <label for="name">Enter Full Name : </label>
                <input type="text" name="name" id="name"><br><br>

                <label for="email">Enter Email : </label>
                <input type="email" name="email" id="email"> <br><br>

                <label for="phone">Contact No : </label>
                <input type="number" name="phone" id="phone"> <br><br>

                <label for="DOB">Date of Birth : </label>
                <input type="date" name="DOB" id="DOB"> <br><br>

                <h3 bgcolor="#454545">EDUCATIONAL DETAILS</h3><br>

                <label for="10th">10th Percentage</label>
                <input type="text" name="10th" id="10th"><br><br>

                <label for="12th">12th Percentage</label>
                <input type="text" name="12th" id="12th"><br><br>

                <label for="degree">Type of Degree : </label>
                <input type="text" name="degree" id="degree"><br><br>

                <label for="course">Course Name : </label>
                <input type="text" name="course" id="course"><br><br>

                <label for="college">Name of college</label>
                <input type="text" name="college" id="college"><br><br>

                <label for="university">University Name : </label>
                <input type="text" name="university" id="university"><br><br>

                <label for="year">Current Year : </label>
                <input type="text" name="year" id="year"><br><br>

                <button type="submit">Submit</button>
                <button type="reset">Reset</button>

            </form>
        </fieldset>
    </center>
</body>
</html>
